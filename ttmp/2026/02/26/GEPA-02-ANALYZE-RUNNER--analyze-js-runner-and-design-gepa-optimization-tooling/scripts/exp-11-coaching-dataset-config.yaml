apiVersion: gepa.dataset-generate/v2
name: coaching-entity-sentiment-small
count: 2
seed: 20260226
prompting:
  system: |
    You generate synthetic longitudinal coaching/therapy cases for NLP benchmarking.
  user_template: |
    Generate ONE complete longitudinal coaching case.

    Requirements:
    - case_id: {{case_id}}
    - session_count: {{session_count}} sessions over {{time_span_months}} months
    - complexity: {{complexity}}
    - realistic spoken transcript style with natural disfluencies
    - include at least 6 named people and relationship changes over time
    - include emotional shifts, setbacks, and at least one major event between sessions

    Return strict JSON only with this structure:
    {
      "case_id": "...",
      "transcript": [
        {
          "session_id": 1,
          "session_date": "YYYY-MM-DD",
          "turns": [
            {"speaker": "coach", "text": "..."},
            {"speaker": "client", "text": "..."}
          ]
        }
      ],
      "ground_truth": {
        "entities": [
          {
            "entity_id": "E001",
            "canonical_name": "...",
            "entity_type": "PERSON",
            "aliases": ["..."],
            "first_mentioned_session": 1,
            "description": "..."
          }
        ],
        "mentions_by_session": [
          {
            "session_id": 1,
            "mentions": [
              {
                "entity_id": "E001",
                "surface_form": "...",
                "turn_index": 3,
                "context_snippet": "..."
              }
            ]
          }
        ],
        "relationships": [
          {
            "relationship_id": "R001",
            "source_entity": "CLIENT",
            "target_entity": "E001",
            "relationship_type": "...",
            "relationship_label": "...",
            "first_mentioned_session": 1
          }
        ],
        "evolution_timeline": [
          {
            "relationship_id": "R001",
            "session_id": 1,
            "session_date": "YYYY-MM-DD",
            "emotional_valence": -0.2,
            "emotional_dimensions": {
              "trust": 0.3,
              "conflict_intensity": 0.7,
              "closeness": 0.2
            },
            "client_stance": "...",
            "key_emotions_expressed": ["..."],
            "notable_shift_from_previous": null,
            "supporting_turn_indices": [2, 5],
            "summary": "..."
          }
        ],
        "client_trajectory": [
          {
            "session_id": 1,
            "session_date": "YYYY-MM-DD",
            "primary_presenting_emotions": ["..."],
            "emotional_awareness_level": "low",
            "self_regulation_capacity": "low",
            "insight_level": "minimal",
            "overall_distress": 0.8,
            "overall_functioning": 0.4,
            "therapist_notes": "..."
          }
        ]
      }
    }

    Notes:
    - Use 5-8 sessions.
    - Each session should have 14-24 turns.
    - Keep outputs valid JSON.
    - Do not include markdown fences.
  variables:
    case_prefix: "COACH_CASE"
    sessions_min: 5
    sessions_max: 6
    time_span_months_min: 3
    time_span_months_max: 5
    complexity: "high"
    max_continuation_attempts: 5
    stream_responses: false
validation:
  required_fields:
    - case_id
    - transcript
    - ground_truth
  max_retries: 2
  drop_invalid: false
